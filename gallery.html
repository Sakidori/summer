<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(120deg, #fbc531 0%, #e84118 100%);
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { text-align: center; text-shadow: 0 2px 5px rgba(0,0,0,0.3); margin-bottom: 20px; }

        .primary-btn {
            display: inline-block;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #ff7eb3;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            margin-bottom: 25px;
        }
        .primary-btn:hover { background-color: #ff529a; transform: translateY(-2px); }

        .login-section { margin-bottom: 25px; }
        .login-btn, .logout-btn { background: #0097e6; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .logout-btn { background: #e84118; }

        .admin-panel { background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 10px; backdrop-filter: blur(5px); margin-bottom: 30px; width: 100%; max-width: 500px; display: none; flex-direction: column; gap: 10px; }
        .upload-btn { background: #4cd137; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; }

        #gallery-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 900px; width: 100%; }
        .gallery-item { background: white; padding: 15px 15px 25px 15px; border-radius: 2px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: 200px; color: #333; display: flex; flex-direction: column; align-items: center; transform: rotate(1deg); }
        .gallery-item img { width: 200px; height: 200px; object-fit: cover; }
        .heart-btn { background: none; border: none; cursor: pointer; color: #ff4757; font-size: 20px; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; width: 100%; }
        #loading-txt { display: none; font-weight: bold; color: #fbc531; }
    </style>
</head>
<body>

    <h1>📸 Summer Photo Gallery</h1>
    <a href="index.html" class="primary-btn">← 戻る</a>

    <h2>皆さんから送っていただいた写真の中から、私たちのお気に入りのものを選んでここにアップロードします！</h2>
    
    <div class="login-section">
        <button class="login-btn" id="authBtn" onclick="toggleAuth()">Admin Login</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3>Admin Upload</h3>
        <input type="text" id="imageTitle" placeholder="Enter picture caption...">
        <input type="file" id="imageFile" accept="image/*">
        <button class="upload-btn" id="uploadBtn" onclick="uploadImage()">Upload Picture</button>
        <div id="loading-txt">Uploading to cloud... Please wait...</div>
    </div>

    <div id="loading-gal" style="text-align: center;">Loading gallery from cloud...</div>
    <div id="gallery-grid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxk_492uH0vJLr-iijocmRHjnvx9eLXY4",
            authDomain: "summer-diary-8e0b6.firebaseapp.com",
            databaseURL: "https://summer-diary-8e0b6-default-rtdb.firebaseio.com",
            projectId: "summer-diary-8e0b6",
            storageBucket: "summer-diary-8e0b6.firebasestorage.app",
            messagingSenderId: "598705676339",
            appId: "1:598705676339:web:860622afb519acd93a8346"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const ADMIN_PASSCODE = "Sowhat";

        if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
            document.getElementById('adminPanel').style.display = 'flex';
            document.getElementById('authBtn').innerText = 'Logout';
            document.getElementById('authBtn').className = 'logout-btn';
        }

        function toggleAuth() {
            if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
                sessionStorage.removeItem('isAdminLoggedIn');
                location.reload();
            } else {
                const entered = prompt("Enter admin passcode:");
                if (entered === ADMIN_PASSCODE) {
                    sessionStorage.setItem('isAdminLoggedIn', 'true');
                    location.reload();
                }
            }
        }

        db.collection("summerPictures").orderBy("likes", "desc").onSnapshot((snapshot) => {
            const grid = document.getElementById('gallery-grid');
            document.getElementById('loading-gal').style.display = 'none';
            grid.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdminLoggedIn') === 'true';

            snapshot.forEach((doc) => {
                const item = doc.data();
                const card = document.createElement('div');
                card.className = 'gallery-item';
                card.innerHTML = `
                    <img src="${item.src}" alt="Gallery Image">
                    <div class="item-title">${item.title}</div>
                    <div class="like-container">
                        <button class="heart-btn" onclick="likeItem('${doc.id}', ${item.likes})">❤️</button>
                        <span>${item.likes} Likes</span>
                    </div>
                    ${isAdmin ? `<button class="delete-btn" onclick="deletePhoto('${doc.id}')">🗑️ Delete</button>` : ''}
                `;
                grid.appendChild(card);
            });
        });

        async function uploadImage() {
            const file = document.getElementById('imageFile').files[0];
            if (!file) return alert('Select an image.');
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('loading-txt').style.display = 'block';

            const reader = new FileReader();
            reader.onload = async (e) => {
                await db.collection("summerPictures").add({
                    src: e.target.result,
                    title: document.getElementById('imageTitle').value || 'Untitled',
                    likes: 0
                });
                location.reload();
            };
            reader.readAsDataURL(file);
        }

        async function likeItem(docId, currentLikes) {
            let likedPhotos = JSON.parse(localStorage.getItem('likedPhotos')) || [];

            if (likedPhotos.includes(docId)) {
                alert("あなたは既にこの写真に「いいね！」をしました！");
                return;
            }

            try {
                await db.collection("summerPictures").doc(docId).update({
                    likes: currentLikes + 1
                });
                likedPhotos.push(docId);
                localStorage.setItem('likedPhotos', JSON.stringify(likedPhotos));
            } catch (err) {
                console.error("Error updating like:", err);
                alert("いいね！の送信に失敗しました。");
            }
        }

        async function deletePhoto(id) {
            if (confirm("Delete this?")) await db.collection("summerPictures").doc(id).delete();
        }
    </script>
</body>
</html>
