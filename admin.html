<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #admin-panel, #login-panel { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        #admin-panel { display: none; max-width: 600px; }
        .admin-card { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        input { padding: 8px; flex-grow: 1; }
        button { padding: 8px 15px; cursor: pointer; background: #ff7eb3; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-panel">
        <h1>Admin Login</h1>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
    </div>

    <div id="admin-panel">
        <h1>Admin Panel</h1>
        <button onclick="firebase.auth().signOut()">Logout</button>
        <hr>
        <div id="admin-container"></div>
    </div>

    <script>
      const firebaseConfig = { 
        apiKey: "AIzaSyBxk_492uH0vJLr-iijocmRHjnvx9eLXY4", 
        projectId: "summer-diary-8e0b6", 
        storageBucket: "summer-diary-8e0b6.firebasestorage.app" 
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    
    // Get the Firestore instance specifically for the compatibility SDK
    const db = firebase.firestore(); 

    async function loadAdminTools() {
    console.log("Attempting to load data...");
    const container = document.getElementById('admin-container');
    container.innerHTML = "";
    
    for (let i = 1; i <= 5; i++) {
        container.innerHTML += `
            <div class="admin-card">
                Title ${i}: <input type="text" id="input${i}" placeholder="Loading...">
                <button onclick="updateTitle(${i})">Update</button>
            </div>`;
        
        try {
            console.log("Fetching: title" + i); // Will this print?
            const docRef = db.collection("settings").doc("title" + i);
            const doc = await docRef.get();
            console.log("Fetched: title" + i); // Will this print?
            
            if (doc.exists) {
                document.getElementById('input' + i).value = doc.data().text;
            } else {
                document.getElementById('input' + i).placeholder = "Empty";
            }
        } catch (e) {
            console.error("CRITICAL ERROR on " + i, e);
        }
    }
}
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                // This ONLY attempts to sign in. It will fail if you haven't created the user in the console.
                await firebase.auth().signInWithEmailAndPassword(email, password);
            } catch (e) {
                alert("Login Failed: " + e.message);
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminTools();
            } else {
                document.getElementById('login-panel').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });
        
        async function updateTitle(idNumber) {
            const db = firebase.firestore();
            const newText = document.getElementById('input' + idNumber).value;
            try {
                await db.collection("settings").doc("title" + idNumber).set({ text: newText });
                alert("Updated!");
            } catch (e) {
                alert("Error: You do not have permission to update this.");
            }
        }
    </script>
</body>
</html>
